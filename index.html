<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Weaver - 口袋编织者</title>
    <style>
        /* --- 全局变量配置 --- */
        :root {
            --ios-bg: rgba(255, 255, 255, 0.7); /* 半透明白色 */
            --ios-radius: 18px; /* 标准iOS圆角 */
            --primary-color: #ffb6c1; /* 默认粉色 */
            --text-main: #333;
            --text-sub: #888;
            --blur-val: 10px; /* 毛玻璃模糊度 */
        }

        /* --- 基础背景设置 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background: url('https://img.heliar.top/file/1773835112006_IMG_20260318_195754.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* 背景遮罩层 (实现40%不透明度效果) */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4); /* 40% 不透明度 */
            z-index: -1;
        }

        /* --- 页面 A 容器 --- */
        #page-a {
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-bottom: 100px; /* 为底部导航留位 */
        }

        /* --- 顶部切换与导入 --- */
        .header-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .module-switcher {
            background: var(--ios-bg);
            backdrop-filter: blur(var(--blur-val));
            border-radius: 12px;
            display: flex;
            padding: 4px;
        }

        .switch-btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            background: transparent;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .switch-btn.active {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .import-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- 世界书展示逻辑 --- */
        .worldbook-card {
            background: var(--ios-bg);
            backdrop-filter: blur(var(--blur-val));
            border-radius: var(--ios-radius);
            margin-bottom: 15px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .book-header {
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .book-title {
            font-weight: bold;
            flex-grow: 1;
        }

        /* 展开/折叠的箭头 */
        .arrow-icon {
            transition: 0.3s;
            color: var(--text-sub);
        }

        /* 条目容器 */
        .entry-list {
            padding: 10px;
            display: block; /* 默认展开 */
        }

        /* 条目单体样式 */
        .entry-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 12px;
        }

        /* 勾选圆框 */
        .check-circle {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            transition: 0.2s;
        }

        .check-circle.checked {
            background: var(--primary-color);
        }

        /* --- 特殊细节：折叠后的空白占位 --- */
        .worldbook-card.collapsed .entry-list {
            display: none;
        }

        .worldbook-card.collapsed {
            margin-bottom: 40px; /* 明显的空白占位 */
            opacity: 0.8;
        }

        .worldbook-card.collapsed .arrow-icon {
            transform: rotate(-90deg);
        }

        /* --- 底部按钮 --- */
        .start-btn {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: var(--ios-radius);
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }

        /* --- 底部固定导航栏 --- */
        .tab-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 65px;
            background: var(--ios-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-sub);
            font-size: 12px;
            text-decoration: none;
        }

        .tab-item.active {
            color: var(--primary-color);
        }

        .icon-placeholder {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            background: currentColor;
            mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
        }
/* --- 1:1 酒馆功能扩展样式 --- */
:root {
    --ios-bg: rgba(255, 255, 255, 0.4); 
    --inner-bg: rgba(255, 255, 255, 0.25);
    --border-color: rgba(0, 0, 0, 0.08);
    --primary-pink: #ffb6c1;
    --st-green: #48bb78;
    --text-dark: #333;
    --text-muted: #666;
}

/* 基础卡片 */
.st-card {
    background: var(--ios-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    margin-bottom: 20px;
    color: var(--text-dark);
    font-size: 13px;
    transition: 0.3s;
}

/* 1. 顶部控制栏 */
.st-header {
    padding: 12px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border-color);
}

.st-title-row { width: 100%; display: flex; align-items: center; margin-bottom: 8px; }

.st-input, .st-select, .st-textarea {
    background: var(--inner-bg);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 4px 8px;
    outline: none;
    font-size: 12px;
}

/* 2. 触发逻辑网格 */
.logic-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 10px;
    padding: 10px;
}

.sub-settings-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    padding: 0 10px 10px;
    font-size: 10px;
}

/* 3. 核心内容与复选框 */
.content-area { padding: 10px; border-top: 1px dashed var(--border-color); }
.st-textarea { width: 100%; box-sizing: border-box; min-height: 80px; resize: vertical; }

.checkbox-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    padding: 8px 0;
}

.check-item { display: flex; align-items: center; gap: 5px; font-size: 11px; }

/* 4. 权重控制区 (4列并列) */
.weight-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 10px;
    background: rgba(0,0,0,0.02);
}

/* 5. 绑定与触发器区 (双栏列表) */
.filter-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px;
}
.list-box {
    height: 80px;
    overflow-y: auto;
    background: var(--inner-bg);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 5px;
}

/* 6. 额外匹配源 (底部网格) */
.extra-vectors {
    padding: 10px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    border-top: 1px solid var(--border-color);
}

/* 标签辅助 */
.label-sm { font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 2px; }

/* 折叠逻辑 */
.st-body { display: none; }
.st-card.open .st-body { display: block; }


    </style>
</head>
<body>

    <div class="bg-overlay"></div>

  <div class="st-card open" id="entry-full-1">
    <div class="st-header">
        <div class="st-title-row">
            <span class="arrow-icon" onclick="toggleEntry('entry-full-1')">▼</span>
            <div class="st-toggle active" style="margin: 0 10px;"></div>
            <input type="text" class="st-input" style="flex:1; font-weight:bold;" value="亚人族设定" readonly>
            <div class="header-icons"> ⇄ 📋 🗑️ </div>
        </div>
        
        <div style="display:flex; gap:8px; width:100%; align-items:flex-end;">
            <div style="flex:2">
                <span class="label-sm">插入位置</span>
                <select class="st-select" style="width:100%" disabled>
                    <option>角色定义之前</option>
                    <option>角色定义之后</option>
                    <option>示例消息前(↑EM)</option>
                    <option>示例消息后(↓EM)</option>
                    <option>作者注释之前</option>
                    <option>作者注释之后</option>
                    <option>[系统]在深度</option>
                </select>
            </div>
            <div style="flex:1">
                <span class="label-sm">深度</span>
                <input type="number" class="st-input" style="width:100%" value="10" readonly>
            </div>
            <div style="flex:1">
                <span class="label-sm">顺序</span>
                <input type="number" class="st-input" style="width:100%" value="100" readonly>
            </div>
            <div style="flex:1">
                <span class="label-sm">触发%</span>
                <input type="number" class="st-input" style="width:100%" value="100" readonly>
            </div>
        </div>
    </div>

    <div class="st-body">
        <div class="logic-grid">
            <div>
                <span class="label-sm">主要关键词</span>
                <textarea class="st-textarea" style="height:40px" readonly>亚人, 半人, 兽人, 言兽</textarea>
            </div>
            <div>
                <span class="label-sm">逻辑判定</span>
                <select class="st-select" style="width:100%" disabled><option>与 任意</option></select>
                <span class="label-sm" style="margin-top:5px">可选过滤器</span>
                <input type="text" class="st-input" style="width:100%" placeholder="过滤词..." readonly>
            </div>
        </div>
        <div class="sub-settings-row">
            <div><span class="label-sm">区分大小写</span><select class="st-select" disabled><option>使用全局</option></select></div>
            <div><span class="label-sm">完整单词</span><select class="st-select" disabled><option>使用全局</option></select></div>
            <div><span class="label-sm">组评分</span><select class="st-select" disabled><option>使用全局</option></select></div>
            <div><span class="label-sm">自动化 ID</span><input type="text" class="st-input" style="width:100%" readonly></div>
        </div>

        <div class="content-area">
            <span class="label-sm">内容 (Content)</span>
            <textarea class="st-textarea" placeholder="输入条目描述..." readonly>- 基因基础: 携带Y染色体
- 外部形态: 纯粹人类形态...</textarea>
            <div class="checkbox-group">
                <div class="check-item"><input type="checkbox" checked disabled> 不可递归</div>
                <div class="check-item"><input type="checkbox" checked disabled> 防止进一步递归</div>
                <div class="check-item"><input type="checkbox" disabled> 延迟到递归</div>
                <div class="check-item"><input type="checkbox" disabled> 无视回复限额</div>
            </div>
        </div>

        <div class="weight-grid">
            <div class="input-group">
                <span class="label-sm">组权重</span>
                <input type="number" class="st-input" value="100" readonly>
            </div>
            <div class="input-group">
                <span class="label-sm">黏性</span>
                <input type="number" class="st-input" value="0" readonly>
            </div>
            <div class="input-group">
                <span class="label-sm">冷却</span>
                <input type="number" class="st-input" value="0" readonly>
            </div>
            <div class="input-group">
                <span class="label-sm">延迟</span>
                <input type="number" class="st-input" value="0" readonly>
            </div>
            <div class="check-item" style="grid-column: span 4; margin-top:5px;">
                <input type="checkbox" disabled> 确定优先级
            </div>
        </div>

        <div class="filter-section">
            <div>
                <span class="label-sm">绑定到角色/标签 (排除 ☐)</span>
                <div class="list-box">
                    <div>default_Seraphina</div>
                    <div>[Tag] ST Default</div>
                </div>
            </div>
            <div>
                <span class="label-sm">筛选生成触发器</span>
                <div class="list-box">

                    <div>✓ 继续</div>
                    <div>AI 帮答</div>

        </div>

        <div class="extra-vectors">
            <div class="check-item"><input type="checkbox" disabled> 角色描述</div>
            <div class="check-item"><input type="checkbox" disabled> 角色性格</div>
            <div class="check-item"><input type="checkbox" disabled> 情景</div>
            <div class="check-item"><input type="checkbox" disabled> 用户设定</div>
        </div>
    </div>
</div>
