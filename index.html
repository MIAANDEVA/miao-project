<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Weaver - 口袋编织者</title>
    <style>
        /* --- 全局变量配置 --- */
        :root {
            --ios-bg: rgba(255, 255, 255, 0.7); /* 半透明白色 */
            --ios-radius: 18px; /* 标准iOS圆角 */
            --primary-color: #ffb6c1; /* 默认粉色 */
            --text-main: #333;
            --text-sub: #888;
            --blur-val: 10px; /* 毛玻璃模糊度 */
        }

        /* --- 基础背景设置 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background: url('https://img.heliar.top/file/1773835112006_IMG_20260318_195754.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* 背景遮罩层 (实现40%不透明度效果) */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4); /* 40% 不透明度 */
            z-index: -1;
        }

        /* --- 页面 A 容器 --- */
        #page-a {
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-bottom: 100px; /* 为底部导航留位 */
        }

        /* --- 顶部切换与导入 --- */
        .header-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .module-switcher {
            background: var(--ios-bg);
            backdrop-filter: blur(var(--blur-val));
            border-radius: 12px;
            display: flex;
            padding: 4px;
        }

        .switch-btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            background: transparent;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .switch-btn.active {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .import-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- 世界书展示逻辑 --- */
        .worldbook-card {
            background: var(--ios-bg);
            backdrop-filter: blur(var(--blur-val));
            border-radius: var(--ios-radius);
            margin-bottom: 15px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .book-header {
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .book-title {
            font-weight: bold;
            flex-grow: 1;
        }

        /* 展开/折叠的箭头 */
        .arrow-icon {
            transition: 0.3s;
            color: var(--text-sub);
        }

        /* 条目容器 */
        .entry-list {
            padding: 10px;
            display: block; /* 默认展开 */
        }

        /* 条目单体样式 */
        .entry-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 12px;
        }

        /* 勾选圆框 */
        .check-circle {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            transition: 0.2s;
        }

        .check-circle.checked {
            background: var(--primary-color);
        }

        /* --- 特殊细节：折叠后的空白占位 --- */
        .worldbook-card.collapsed .entry-list {
            display: none;
        }

        .worldbook-card.collapsed {
            margin-bottom: 40px; /* 明显的空白占位 */
            opacity: 0.8;
        }

        .worldbook-card.collapsed .arrow-icon {
            transform: rotate(-90deg);
        }

        /* --- 底部按钮 --- */
        .start-btn {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: var(--ios-radius);
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }

        /* --- 底部固定导航栏 --- */
        .tab-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 65px;
            background: var(--ios-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-sub);
            font-size: 12px;
            text-decoration: none;
        }

        .tab-item.active {
            color: var(--primary-color);
        }

        .icon-placeholder {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            background: currentColor;
            mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
        }
/* --- 全局变量与背景调整 --- */
:root {
    --ios-bg: rgba(255, 255, 255, 0.45); /* 提升透明度以显现背景图 */
    --ios-radius: 14px;
    --primary-color: #ffb6c1; /* 默认粉色 */
    --text-main: #2c3e50;
    --text-sub: #5d6d7e;
    --card-inner-bg: rgba(255, 255, 255, 0.3); /* 内部区域更透 */
    --border-light: rgba(255, 255, 255, 0.5);
    --st-green: #48bb78; /* 酒馆风格绿 */
}

body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, sans-serif;
    background: url('https://img.heliar.top/file/1773835112006_IMG_20260318_195754.jpg') no-repeat center center fixed;
    background-size: cover;
    color: var(--text-main);
    min-height: 100vh;
}

/* 首页容器 A */
#page-a {
    padding: 15px;
    padding-bottom: 100px;
}

/* --- 酒馆 1:1 卡片布局 --- */
.entry-card {
    background: var(--ios-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-light);
    border-radius: var(--ios-radius);
    margin-bottom: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    transition: 0.3s;
}

/* 卡片头部 */
.card-header {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    gap: 8px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}

.st-toggle {
    width: 32px;
    height: 16px;
    background: rgba(0,0,0,0.1);
    border-radius: 20px;
    position: relative;
    cursor: pointer;
}
.st-toggle.active { background: var(--st-green); }
.st-toggle::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: 0.2s;
}
.st-toggle.active::after { left: 18px; }

.entry-name-input {
    flex-grow: 1;
    background: transparent;
    border: none;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-main);
    outline: none;
}

/* --- 展开后的详情区 (网格) --- */
.entry-detail {
    padding: 12px;
    font-size: 12px;
}

/* 参数行：位置下拉框 */
.param-row-main {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
}

.st-select {
    flex-grow: 1;
    background: var(--card-inner-bg);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 5px;
    font-size: 12px;
}

/* 酒馆核心三参数：深度、顺序、概率 */
.three-params {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    text-align: center;
}

.input-group label {
    font-size: 10px;
    color: var(--text-sub);
}

.st-num-input {
    background: var(--card-inner-bg);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    padding: 4px;
    text-align: center;
    font-weight: bold;
}

/* 关键字与逻辑区 */
.kw-logic-box {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}

.textarea-box {
    flex: 2;
    background: var(--card-inner-bg);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 6px;
    min-height: 40px;
    color: var(--text-main);
}

.logic-select {
    flex: 1;
    background: var(--card-inner-bg);
    border: 1px solid var(--border-light);
    border-radius: 6px;
}

/* 内容显示区 (多行文本预览) */
.content-preview {
    background: rgba(0,0,0,0.03);
    border-radius: 8px;
    padding: 10px;
    font-size: 11px;
    line-height: 1.5;
    color: #444;
    white-space: pre-wrap;
    max-height: 100px;
    overflow-y: auto;
}

/* 折叠逻辑控制 */
.detail-container { display: none; } /* 默认关闭详情 */
.entry-card.expanded .detail-container { display: block; }
.entry-card.expanded .arrow-icon { transform: rotate(90deg); }

/* --- 顶部与底部 --- */
.header-tools { display: flex; justify-content: space-between; padding: 10px 0; }
.start-btn {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    background: var(--primary-color);
    color: white;
    text-align: center;
    padding: 12px;
    border-radius: 30px;
    font-weight: bold;
    box-shadow: 0 4px 15px rgba(255,182,193,0.5);
    z-index: 99;
}


    </style>
</head>
<body>

    <div class="bg-overlay"></div>

  <main id="page-a">
    <div class="header-tools">
        <div class="module-switcher">
            <button class="switch-btn active">世界书</button>
            <button class="switch-btn">正则</button>
        </div>
        <button class="import-btn">📥</button>
    </div>

    <div class="entry-card expanded" id="entry-1"> <div class="card-header">
            <div class="select-wrapper">
                <div class="check-circle" onclick="event.stopPropagation(); this.classList.toggle('checked')"></div>
            </div>
            <div class="arrow-icon" onclick="toggleEntry('entry-1')">▶</div>
            <div class="st-toggle active"></div>
            <input type="text" class="entry-name-input" value="角色补充: 亚人族" readonly>
            <div class="header-icons">📋 🗑️</div>
        </div>

        <div class="detail-container">
            <div class="entry-detail">
                <div class="param-row-main">
                    <span style="font-size: 11px; color: var(--text-sub);">位置:</span>
                    <select class="st-select" disabled>
                        <option>角色定义之前</option>
                        <option>角色定义之后</option>
                        <option>示例消息前(↑EM)</option>
                        <option>示例消息后(↓EM）</option>
                        <option>作者注释之前</option>
                        <option>作者注释之后</option>
                        <option>[系统]在深度</option>
                        <option>[用户]在深度</option>
                        <option>[AI]在深度</option>
                        <option>锚点</option>
                    </select>
                    <span>🔄</span> </div>

                <div class="three-params">
                    <div class="input-group">
                        <label>深度</label>
                        <div class="st-num-input">10</div>
                    </div>
                    <div class="input-group">
                        <label>顺序</label>
                        <div class="st-num-input">100</div>
                    </div>
                    <div class="input-group">
                        <label>触发 %</label>
                        <div class="st-num-input">100</div>
                    </div>
                </div>

                <div class="kw-logic-box">
                    <div class="textarea-box">亚人, 半人, 兽人, 言兽</div>
                    <select class="logic-select" disabled>
                        <option>与 任意</option>
                    </select>
                </div>

                <div class="content-preview">
- 基因基础: 携带Y染色体
- 外部形态: 纯粹人类形态，不携带任何动物特征 (无毛皮、鳞片、尾、角等)
... (这里是 JSON 里的具体内容)
                </div>
            </div>
        </div>
    </div>

    <div class="start-btn">开始整理 (Page B)</div>
</main>

<script>
    // 处理卡片展开/收起
    function toggleEntry(id) {
        document.getElementById(id).classList.toggle('expanded');
    }
</script>
