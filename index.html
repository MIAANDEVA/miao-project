<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Weaver - 口袋编织者</title>
    <style>
        /* --- 全局变量配置 --- */
        :root {
            --ios-bg: rgba(255, 255, 255, 0.7); /* 半透明白色 */
            --ios-radius: 18px; /* 标准iOS圆角 */
            --primary-color: #ffb6c1; /* 默认粉色 */
            --text-main: #333;
            --text-sub: #888;
            --blur-val: 10px; /* 毛玻璃模糊度 */
        }

        /* --- 基础背景设置 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background: url('https://img.heliar.top/file/1773835112006_IMG_20260318_195754.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* 背景遮罩层 (实现40%不透明度效果) */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4); /* 40% 不透明度 */
            z-index: -1;
        }

        /* --- 页面 A 容器 --- */
        #page-a {
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-bottom: 100px; /* 为底部导航留位 */
        }

        /* --- 顶部切换与导入 --- */
        .header-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .module-switcher {
            background: var(--ios-bg);
            backdrop-filter: blur(var(--blur-val));
            border-radius: 12px;
            display: flex;
            padding: 4px;
        }

        .switch-btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            background: transparent;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .switch-btn.active {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .import-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- 世界书展示逻辑 --- */
        .worldbook-card {
            background: var(--ios-bg);
            backdrop-filter: blur(var(--blur-val));
            border-radius: var(--ios-radius);
            margin-bottom: 15px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .book-header {
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .book-title {
            font-weight: bold;
            flex-grow: 1;
        }

        /* 展开/折叠的箭头 */
        .arrow-icon {
            transition: 0.3s;
            color: var(--text-sub);
        }

        /* 条目容器 */
        .entry-list {
            padding: 10px;
            display: block; /* 默认展开 */
        }

        /* 条目单体样式 */
        .entry-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 12px;
        }

        /* 勾选圆框 */
        .check-circle {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            transition: 0.2s;
        }

        .check-circle.checked {
            background: var(--primary-color);
        }

        /* --- 特殊细节：折叠后的空白占位 --- */
        .worldbook-card.collapsed .entry-list {
            display: none;
        }

        .worldbook-card.collapsed {
            margin-bottom: 40px; /* 明显的空白占位 */
            opacity: 0.8;
        }

        .worldbook-card.collapsed .arrow-icon {
            transform: rotate(-90deg);
        }

        /* --- 底部按钮 --- */
        .start-btn {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: var(--ios-radius);
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }

        /* --- 底部固定导航栏 --- */
        .tab-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 65px;
            background: var(--ios-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-sub);
            font-size: 12px;
            text-decoration: none;
        }

        .tab-item.active {
            color: var(--primary-color);
        }

        .icon-placeholder {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            background: currentColor;
            mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
        }
/* --- 酒馆风格参数区专有样式 --- */
.entry-card {
    background: rgba(26, 26, 26, 0.85); /* 深色背景，对标酒馆 */
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    margin-bottom: 12px;
    color: #eee;
    overflow: hidden;
    transition: all 0.2s ease;
}

.entry-card:hover {
    border-color: var(--primary-color);
    box-shadow: 0 0 8px rgba(255, 182, 193, 0.3);
}

/* 卡片头部：开关、名称、操作 */
.card-header {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.05);
    gap: 10px;
}

.st-toggle {
    width: 34px;
    height: 18px;
    background: #444;
    border-radius: 10px;
    position: relative;
    cursor: pointer;
}
.st-toggle.active { background: #4caf50; } /* 酒馆绿 */
.st-toggle::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: 0.2s;
}
.st-toggle.active::after { left: 18px; }

.entry-name-display {
    flex-grow: 1;
    font-size: 14px;
    font-weight: bold;
    color: #fff;
}

.header-icons {
    display: flex;
    gap: 8px;
    color: #aaa;
    font-size: 14px;
}

/* 网格参数区：位置、深度、顺序等 */
.params-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 双列布局 */
    gap: 10px;
    padding: 12px;
    font-size: 12px;
    background: rgba(0, 0, 0, 0.2);
}

.param-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.param-label {
    color: #888;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.5px;
}

.param-value-box {
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 4px 8px;
    color: var(--primary-color); /* 突出显示参数值 */
}

/* 触发词展示区 */
.kw-area {
    padding: 8px 12px;
    border-top: 1px dashed rgba(255, 255, 255, 0.1);
}

.kw-tag {
    display: inline-block;
    background: rgba(255, 182, 193, 0.2);
    color: var(--primary-color);
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 5px;
    font-size: 11px;
}

/* 首页特有的选择圆圈 (放在卡片最左侧) */
.entry-container {
    display: flex;
    align-items: flex-start;
    gap: 10px;
}
.select-wrapper {
    padding-top: 15px;
}

    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <main id="page-a">
    <div class="header-tools">
        <div class="module-switcher">
            <button class="switch-btn active">世界书</button>
            <button class="switch-btn">正则</button>
        </div>
        <button class="import-btn" title="导入 JSON">📥</button>
    </div>

    <div class="worldbook-card" id="book-primary">
        <div class="book-header" onclick="toggleBook('book-primary')">
            <span class="book-title">📚 Genshin_Impact_Lore.json</span>
            <span class="arrow-icon">▼</span>
        </div>

        <div class="entry-list">
            
            <div class="entry-container">
                <div class="select-wrapper">
                    <div class="check-circle" onclick="this.classList.toggle('checked')"></div>
                </div>
                
                <div class="entry-card">
                    <div class="card-header">
                        <div class="arrow-icon" style="font-size: 10px;">▶</div>
                        <div class="st-toggle active"></div> <div class="entry-name-display">雷电将军 (Raiden Shogun)</div>
                        <div class="header-icons">
                            <span>📋</span> <span>🗑️</span> </div>
                    </div>

                    <div class="params-grid">
                        <div class="param-item">
                            <span class="param-label">插入位置 (Position)</span>
                            <div class="param-value-box">EMBED (随上下文插入)</div>
                        </div>
                        <div class="param-item">
                            <span class="param-label">深度 (Depth)</span>
                            <div class="param-value-box">4</div>
                        </div>
                        <div class="param-item">
                            <span class="param-label">顺序 (Order)</span>
                            <div class="param-value-box">100</div>
                        </div>
                        <div class="param-item">
                            <span class="param-label">触发概率 (%)</span>
                            <div class="param-value-box">100</div>
                        </div>
                    </div>

                    <div class="kw-area">
                        <span class="param-label">触发词:</span><br>
                        <span class="kw-tag">雷电将军</span>
                        <span class="kw-tag">影</span>
                        <span class="kw-tag">稻妻</span>
                    </div>
                </div>
            </div>
            </div>
    </div>

    <div class="start-btn" onclick="alert('即将进入页面 B 进行编辑...')">开始整理条目 (已选 1)</div>
</main>
