<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Weaver - 口袋编织者</title>
    <style>
        /* --- 全局变量配置 --- */
        :root {
            --ios-bg: rgba(255, 255, 255, 0.7); /* 半透明白色 */
            --ios-radius: 18px; /* 标准iOS圆角 */
            --primary-color: #ffb6c1; /* 默认粉色 */
            --text-main: #333;
            --text-sub: #888;
            --blur-val: 10px; /* 毛玻璃模糊度 */
        }

        /* --- 基础背景设置 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background: url('https://img.heliar.top/file/1773835112006_IMG_20260318_195754.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* 背景遮罩层 (实现40%不透明度效果) */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4); /* 40% 不透明度 */
            z-index: -1;
        }

        /* --- 页面 A 容器 --- */
        #page-a {
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-bottom: 100px; /* 为底部导航留位 */
        }

        /* --- 顶部切换与导入 --- */
        .header-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .module-switcher {
            background: var(--ios-bg);
            backdrop-filter: blur(var(--blur-val));
            border-radius: 12px;
            display: flex;
            padding: 4px;
        }

        .switch-btn {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            background: transparent;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .switch-btn.active {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .import-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50%;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- 世界书展示逻辑 --- */
        .worldbook-card {
            background: var(--ios-bg);
            backdrop-filter: blur(var(--blur-val));
            border-radius: var(--ios-radius);
            margin-bottom: 15px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .book-header {
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
        }

        .book-title {
            font-weight: bold;
            flex-grow: 1;
        }

        /* 展开/折叠的箭头 */
        .arrow-icon {
            transition: 0.3s;
            color: var(--text-sub);
        }

        /* 条目容器 */
        .entry-list {
            padding: 10px;
            display: block; /* 默认展开 */
        }

        /* 条目单体样式 */
        .entry-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 12px;
        }

        /* 勾选圆框 */
        .check-circle {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            transition: 0.2s;
        }

        .check-circle.checked {
            background: var(--primary-color);
        }

        /* --- 特殊细节：折叠后的空白占位 --- */
        .worldbook-card.collapsed .entry-list {
            display: none;
        }

        .worldbook-card.collapsed {
            margin-bottom: 40px; /* 明显的空白占位 */
            opacity: 0.8;
        }

        .worldbook-card.collapsed .arrow-icon {
            transform: rotate(-90deg);
        }

        /* --- 底部按钮 --- */
        .start-btn {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: var(--ios-radius);
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.4);
        }

        /* --- 底部固定导航栏 --- */
        .tab-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 65px;
            background: var(--ios-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-sub);
            font-size: 12px;
            text-decoration: none;
        }

        .tab-item.active {
            color: var(--primary-color);
        }

        .icon-placeholder {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            background: currentColor;
            mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
        }
/* --- 1:1 酒馆功能扩展样式 --- */
.full-params-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 10px;
}

/* 扫条深度、区分大小写等四列排版 */
.four-cols {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
}

.st-label-small {
    font-size: 9px;
    color: var(--text-sub);
    text-align: center;
    margin-bottom: 3px;
    white-space: nowrap;
}

/* 针对酒馆特有的复选框组 */
.checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin: 10px 0;
}

.st-checkbox-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
}

.st-checkbox-item input[type="checkbox"] {
    accent-color: var(--primary-color);
    width: 14px;
    height: 14px;
}

/* 包含组、权重等参数 */
.group-params {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr;
    gap: 4px;
    background: rgba(0,0,0,0.03);
    padding: 8px;
    border-radius: 8px;
}

/* 底部选择框 (角色/标签/触发器) */
.bottom-selectors {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
}

.st-multiselect {
    background: var(--card-inner-bg);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    height: 60px;
    font-size: 11px;
    overflow-y: auto;
    padding: 4px;
}


    </style>
</head>
<body>

    <div class="bg-overlay"></div>

  <main id="page-a">
    <div class="header-tools">
        <div class="module-switcher">
            <button class="switch-btn active">世界书</button>
            <button class="switch-btn">正则</button>
        </div>
        <button class="import-btn">📥</button>
    </div>

    <div class="entry-card" id="entry-demo">
    <div class="card-header">
        <div class="select-wrapper">
            <div class="check-circle" onclick="event.stopPropagation(); this.classList.toggle('checked')"></div>
        </div>
        <div class="arrow-icon" onclick="toggleEntry('entry-demo')">▼</div>
        <div class="st-toggle active"></div>
        <input type="text" class="entry-name-input" value="亚人族设定 (UID: 1)" readonly>
        <div class="header-icons">📋 💾 🗑️</div>
    </div>

    <div class="detail-container">
        <div class="full-params-grid">
            
            <div class="param-row-main">
                <span class="st-label-small">位置:</span>
                <select class="st-select" disabled>
                    <option>角色定义之前</option>
                    <option>角色定义之后</option>
                    <option>示例消息前(↑EM)</option>
                    <option>示例消息后(↓EM）</option>
                    <option>作者注释之前</option>
                    <option>作者注释之后</option>
                    <option>[系统]在深度</option>
                    <option>锚点</option>
                </select>
                <span>🔄 📋</span>
            </div>

            <div class="three-params">
                <div class="input-group"><label>深度</label><div class="st-num-input">10</div></div>
                <div class="input-group"><label>顺序</label><div class="st-num-input">100</div></div>
                <div class="input-group"><label>触发 %</label><div class="st-num-input">100</div></div>
            </div>

            <div class="st-label-small" style="text-align:left">主要关键字:</div>
            <div class="kw-logic-box">
                <div class="textarea-box">亚人, 半人, 兽人</div>
                <div class="input-group">
                    <label>逻辑</label>
                    <select class="st-select" style="width:70px;" disabled>
                        <option>与任意</option>
                        <option>与所有</option>
                        <option>非所有</option>
                        <option>非任何</option>
                    </select>
                </div>
            </div>

            <div class="four-cols">
                <div class="input-group"><label class="st-label-small">扫描深度</label><select class="st-select" disabled><option>使用全局</option></select></div>
                <div class="input-group"><label class="st-label-small">区分大小写</label><select class="st-select" disabled><option>使用全局</option><option>是</option><option>否</option></select></div>
                <div class="input-group"><label class="st-label-small">完整单词</label><select class="st-select" disabled><option>使用全局</option><option>是</option><option>否</option></select></div>
                <div class="input-group"><label class="st-label-small">组评分</label><select class="st-select" disabled><option>使用全局</option><option>是</option><option>否</option></select></div>
            </div>

            <div class="checkbox-group">
                <label class="st-checkbox-item"><input type="checkbox" checked disabled> 不可递归 (不会被其他条目激活)</label>
                <label class="st-checkbox-item"><input type="checkbox" checked disabled> 防止进一步递归</label>
                <label class="st-checkbox-item"><input type="checkbox" disabled> 延迟到递归</label>
                <label class="st-checkbox-item"><input type="checkbox" disabled> 无视回复限额</label>
            </div>

            <div class="st-label-small" style="text-align:left">内容 (词符估计: 128):</div>
            <div class="content-preview" style="max-height: 200px;">
                此处是酒馆世界书的内容描述文本...
                支持多行显示。
            </div>

            <div class="group-params">
                <div class="st-checkbox-item" style="font-size:9px;"><input type="checkbox"> 确定优先级</div>
                <div class="input-group"><label>组权重</label><div class="st-num-input">100</div></div>
                <div class="input-group"><label>黏性</label><div class="st-num-input">0</div></div>
                <div class="input-group"><label>冷却</label><div class="st-num-input">0</div></div>
                <div class="input-group"><label>延迟</label><div class="st-num-input">0</div></div>
            </div>

            <div class="bottom-selectors">
                <div class="input-group">
                    <label class="st-label-small">绑定到角色或标签</label>
                    <div class="st-multiselect">-- 未找到角色 --<br>default_Seraphina</div>
                </div>
                <div class="input-group">
                    <label class="st-label-small">筛选生成触发器</label>
                    <div class="st-multiselect">正常<br>继续<br>AI 帮答</div>
                </div>
            </div>

        </div>
    </div>
</div>
